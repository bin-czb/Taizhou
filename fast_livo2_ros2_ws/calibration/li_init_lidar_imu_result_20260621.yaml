  T_lidar_to_imu:
    - [0.097750, -0.954980, 0.280105, 0.062504]
    - [0.993303, 0.076200, -0.086848, 0.037654]
    - [0.061594, 0.286718, 0.956033, 0.214610]
    - [0.0, 0.0, 0.0, 1.0]

mechanical_prior:
  description: IMU y axis forward, IMU x axis camera-right, IMU below LiDAR by about 0.08 m.
  expected_rotation_lidar_to_imu_matrix:

  accel_bias_mps2: [0.009857, -0.009794, 0.010340]
  gravity_world_mps2: [-0.471921, 0.308291, -9.793791]
  T_lidar_to_imu:
    - [0.004862, -0.999944, -0.009378, 0.038440]
    - [0.999678, 0.004627, 0.024937, -0.010987]
    - [-0.024893, -0.009497, 0.999645, 0.103455]

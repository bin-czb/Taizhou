# Official HKU-MARS LiDAR_IMU_Init run on the recorded LiDAR-IMU bag.
# Date: 2026-06-21
#
# Input:
#   ROS2 bag:
#     /home/czb/fast_livo2_validation_bags/lidar_imu_init_20260621_165848
#   Converted ROS1 bag:
#     /home/czb/Tai Zhou/fast_livo2_ros2_ws/converted_bags_ros1/lidar_imu_init_20260621_165848_ros1.bag
#
# Notes:
#   - The recorded Livox Mid-360 topic is sensor_msgs/PointCloud2 from livox_ros_driver2,
#     not the ROS1 livox_ros_driver/CustomMsg expected by upstream LI-Init.
#   - A local compatibility adapter was added in third_party/LiDAR_IMU_Init to convert
#     the PointCloud2 timestamp field from absolute nanoseconds to per-frame offset time.
#   - IMU rate reported by LI-Init was about 50 Hz. Upstream LI-Init warns that >150 Hz
#     is recommended, so this result should be treated as a candidate, not final truth.
#   - The initialization result matches the mechanical yaw relationship much better than
#     the refinement result. Do not blindly overwrite the hand-measured config with the
#     refinement result without a projection/odometry validation.

source: official_hku_mars_li_init_docker_noetic
ros2_bag: /home/czb/fast_livo2_validation_bags/lidar_imu_init_20260621_165848
ros1_bag: /home/czb/Tai Zhou/fast_livo2_ros2_ws/converted_bags_ros1/lidar_imu_init_20260621_165848_ros1.bag
upstream_result_file: /home/czb/Tai Zhou/fast_livo2_ros2_ws/third_party/LiDAR_IMU_Init/result/Initialization_result.txt

imu_rate_hz_observed: 50.05
imu_rate_warning: upstream_recommends_higher_than_150_hz

transform_convention:
  name: lidar_to_imu
  equation: p_imu = R_LI * p_lidar + T_LI

initialization_result:
